<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; background-image: url('1044855.jpg'); background-size: cover; background-attachment: fixed; color: #333; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 10px; }
        h1 { text-align: center; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); text-transform: uppercase; }
        
        /* BLOQUES CON TRANSPARENCIA */
        .glass-block { background: rgba(255, 255, 255, 0.85); padding: 20px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        
        .admin-section h3 { margin-top: 0; color: #2980b9; }
        .price-edit-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; }
        .edit-input { border: 1px solid #ccc; padding: 5px; border-radius: 5px; }
        .edit-name { width: 50%; font-weight: bold; }
        .edit-price { width: 30%; text-align: right; color: #c0392b; font-weight: bold; }
        
        .ticket { border: 2px solid #34495e; padding: 15px; margin-top: 20px; border-radius: 15px; background: rgba(255,255,255,0.95); position: relative; }
        .btn-delete { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        
        .quick-add { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .quick-add button { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        
        .items-grid { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; margin: 10px 0; border-top: 1px solid #eee; padding-top: 8px; }
        .prod-name { font-weight: bold; color: #2c3e50; }
        .prod-qty-price { display: flex; align-items: center; gap: 10px; }
        .prod-qty-price input { width: 50px; text-align: center; border: 1px solid #ccc; border-radius: 5px; }
        .price-text { color: #27ae60; font-weight: bold; min-width: 60px; text-align: right; }
        
        .total-display { font-size: 1.4rem; color: #c0392b; font-weight: bold; margin-top: 15px; }
        .global-totals { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(44, 62, 80, 0.9); color: #2ecc71; padding: 20px; text-align: center; font-size: 1.6rem; font-weight: bold; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<div class="app-container">
    <h1>SISTEMA DE VENTAS</h1>
    
    <div class="glass-block">
        <h3>Agregar nuevo producto</h3>
        <input type="text" id="p-name" placeholder="Nombre" style="width:40%; padding:8px;">
        <input type="number" id="p-price" placeholder="Precio" style="width:30%; padding:8px;">
        <button onclick="addProd()" style="background:#27ae60; color:white; border:none; padding:8px 15px; border-radius:5px;">Agregar</button>
    </div>

    <div class="glass-block" id="price-list"></div>
    
    <div class="glass-block">
        <input type="text" id="client-name" placeholder="Nombre cliente..." style="padding:8px; width:50%;">
        <button onclick="addTicket()" style="background:#2980b9; color:white; border:none; padding:8px 15px; border-radius:5px;">Crear Ticket</button>
    </div>
    
    <div id="tickets-container"></div>
    <div style="height: 100px;"></div>
</div>

<div class="global-totals">TOTAL: <span id="grand-total">$0</span></div>

<script>
    let productos = JSON.parse(localStorage.getItem('productos')) || [];
    let tickets = JSON.parse(localStorage.getItem('tickets')) || [];

    function save() {
        localStorage.setItem('productos', JSON.stringify(productos));
        localStorage.setItem('tickets', JSON.stringify(tickets));
        render();
    }

    function addProd() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(!name || !price) return;
        productos.push({id: Date.now(), name, price: parseInt(price)});
        save();
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
    }

    function updateProduct(id, field, value) {
        const p = productos.find(prod => prod.id === id);
        if(p) { field === 'name' ? p.name = value : p.price = parseInt(value); save(); }
    }

    function addTicket() {
        const name = document.getElementById('client-name').value;
        if(!name) return;
        tickets.push({id: Date.now(), name: name.toUpperCase(), items: {}, note: ''});
        save();
        document.getElementById('client-name').value = '';
    }

    function confirmRemove(id) {
        if(confirm("¿Estás seguro de que quieres eliminar este ticket?")) {
            tickets = tickets.filter(t => t.id !== id);
            save();
        }
    }

    function updateItem(tId, pId, val) { tickets.find(t => t.id === tId).items[pId] = parseInt(val) || 0; save(); }
    function updateNote(tId, note) { tickets.find(t => t.id === tId).note = note; localStorage.setItem('tickets', JSON.stringify(tickets)); }

    function render() {
        const pList = document.getElementById('price-list');
        pList.innerHTML = '<h3>PRECIOS UNITARIOS ($)</h3>';
        productos.forEach(p => pList.innerHTML += `<div class="price-edit-row"><input class="edit-input edit-name" value="${p.name}" onblur="updateProduct(${p.id}, 'name', this.value)"><input class="edit-input edit-price" value="${p.price}" onblur="updateProduct(${p.id}, 'price', this.value)"></div>`);

        const tCont = document.getElementById('tickets-container');
        tCont.innerHTML = '';
        let grandTotal = 0;

        tickets.forEach(t => {
            let tTotal = 0;
            const div = document.createElement('div');
            div.className = 'ticket';
            let html = `<button class="btn-delete" onclick="confirmRemove(${t.id})">X</button><h3>CLIENTE: ${t.name}</h3><div class="quick-add">`;
            productos.forEach(p => html += `<button onclick="updateItem(${t.id}, ${p.id}, (${t.items[p.id] || 0} + 1))">+ ${p.name}</button>`);
            html += `</div>`;
            
            productos.forEach(p => {
                const qty = t.items[p.id] || 0;
                if(qty > 0) {
                    tTotal += (qty * p.price);
                    html += `<div class="items-grid"><span class="prod-name">${p.name}</span><div class="prod-qty-price"><input type="number" value="${qty}" oninput="updateItem(${t.id}, ${p.id}, this.value)"><span class="price-text">$${qty * p.price}</span></div></div>`;
                }
            });
            
            html += `<div class="total-display">TOTAL: $${tTotal}</div><input type="text" placeholder="Nota..." value="${t.note}" oninput="updateNote(${t.id}, this.value)" style="width:90%; margin-top:10px; padding:5px;">`;
            div.innerHTML = html;
            tCont.appendChild(div);
            grandTotal += tTotal;
        });
        document.getElementById('grand-total').innerText = '$' + grandTotal;
    }
    render();
</script>
</body>
</html>
