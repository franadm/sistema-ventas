<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; background-image: url('1044855.jpg'); background-size: cover; background-attachment: fixed; color: #333; }
        .app-container { max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.96); padding: 20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #2c3e50; text-transform: uppercase; }
        
        .admin-section { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
        .admin-section h3 { margin-top: 0; color: #2980b9; }
        .admin-section input { width: 35%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .admin-section button { padding: 8px 15px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        /* ESTILO PARA EDITAR NOMBRES Y PRECIOS */
        .price-edit-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .edit-input { border: 1px dashed #ccc; padding: 2px 5px; border-radius: 4px; }
        .edit-name { width: 140px; font-weight: bold; }
        .edit-price { width: 60px; text-align: right; color: #c0392b; font-weight: bold; }
        
        .ticket { border: 2px solid #34495e; padding: 15px; margin-top: 25px; border-radius: 10px; background: #fff; position: relative; }
        .btn-delete { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        
        .quick-add { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .quick-add button { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        
        .items-table { width: 100%; margin: 10px 0; border-collapse: collapse; }
        .items-table .col-name { font-weight: bold; color: #2c3e50; }
        .items-table .col-sub { color: #27ae60; font-weight: bold; text-align: right; }
        
        .total-display { font-size: 1.3rem; color: #c0392b; font-weight: bold; margin-top: 10px; }
        .global-totals { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; color: #2ecc71; padding: 20px; text-align: center; font-size: 1.6rem; font-weight: bold; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="app-container">
    <h1>SISTEMA DE VENTAS</h1>
    <div class="admin-section">
        <h3>Agregar nuevo producto</h3>
        <input type="text" id="p-name" placeholder="Nombre">
        <input type="number" id="p-price" placeholder="Precio">
        <button onclick="addProd()">Agregar</button>
    </div>

    <div id="price-list"></div>
    <hr>
    
    <input type="text" id="client-name" placeholder="Nombre cliente...">
    <button onclick="addTicket()" style="background:#2980b9; color:white; border:none; padding:8px 15px; border-radius:5px;">Crear Ticket</button>
    
    <div id="tickets-container"></div>
    <div style="height: 80px;"></div>
</div>

<div class="global-totals">TOTAL: <span id="grand-total">$0</span></div>

<script>
    let productos = JSON.parse(localStorage.getItem('productos')) || [];
    let tickets = JSON.parse(localStorage.getItem('tickets')) || [];

    function save() {
        localStorage.setItem('productos', JSON.stringify(productos));
        localStorage.setItem('tickets', JSON.stringify(tickets));
        render();
    }

    function addProd() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(!name || !price) return;
        productos.push({id: Date.now(), name, price: parseInt(price)});
        save();
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
    }

    function updateProduct(id, field, value) {
        const p = productos.find(prod => prod.id === id);
        if(p) { 
            if(field === 'name') p.name = value;
            if(field === 'price') p.price = parseInt(value) || 0;
            save(); 
        }
    }

    function addTicket() {
        const name = document.getElementById('client-name').value;
        if(!name) return;
        tickets.push({id: Date.now(), name: name.toUpperCase(), items: {}, note: ''});
        save();
        document.getElementById('client-name').value = '';
    }

    function removeTicket(id) { tickets = tickets.filter(t => t.id !== id); save(); }

    function updateItem(tId, pId, val) {
        const t = tickets.find(t => t.id === tId);
        t.items[pId] = parseInt(val) || 0;
        save();
    }

    function updateNote(tId, note) {
        const t = tickets.find(t => t.id === tId);
        t.note = note;
        localStorage.setItem('tickets', JSON.stringify(tickets));
    }

    function render() {
        const pList = document.getElementById('price-list');
        pList.innerHTML = '<h3>PRECIOS UNITARIOS ($)</h3>';
        productos.forEach(p => {
            pList.innerHTML += `<div class="price-edit-row">
                <input class="edit-input edit-name" value="${p.name}" onblur="updateProduct(${p.id}, 'name', this.value)">
                <input class="edit-input edit-price" value="${p.price}" onblur="updateProduct(${p.id}, 'price', this.value)">
            </div>`;
        });

        const tCont = document.getElementById('tickets-container');
        tCont.innerHTML = '';
        let grandTotal = 0;

        tickets.forEach(t => {
            let tTotal = 0;
            const div = document.createElement('div');
            div.className = 'ticket';
            
            let html = `<button class="btn-delete" onclick="removeTicket(${t.id})">X</button>
                        <h3 style="margin-top:0">CLIENTE: ${t.name}</h3>`;
            html += `<div class="quick-add">`;
            productos.forEach(p => html += `<button onclick="updateItem(${t.id}, ${p.id}, (${t.items[p.id] || 0} + 1))">+ ${p.name}</button>`);
            html += `</div><table class="items-table">`;
            
            productos.forEach(p => {
                const qty = t.items[p.id] || 0;
                if(qty > 0) {
                    const sub = qty * p.price;
                    tTotal += sub;
                    html += `<tr>
                        <td class="col-name">${p.name}</td>
                        <td style="text-align:center"><input type="number" value="${qty}" oninput="updateItem(${t.id}, ${p.id}, this.value)"></td>
                        <td class="col-sub">$${sub}</td>
                    </tr>`;
                }
            });
            
            html += `</table><div class="total-display">TOTAL: $${tTotal}</div>
                     <input type="text" placeholder="Nota o deuda..." value="${t.note}" oninput="updateNote(${t.id}, this.value)" style="width:90%; margin-top:10px;">`;
            div.innerHTML = html;
            tCont.appendChild(div);
            grandTotal += tTotal;
        });
        document.getElementById('grand-total').innerText = '$' + grandTotal;
    }
    render();
</script>
</body>
</html>
